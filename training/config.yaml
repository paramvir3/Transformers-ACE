# config.yaml

# ------------------------------------------------------------------------------
# 1. DATASETS
# ------------------------------------------------------------------------------
train_file: "training/data_2.extxyz" # Your full dataset
valid_file: null                  # Leave null to use random split
val_split: 0.1                    # 10% of data used for validation (randomly selected)
model_save_path: "model.pt"

# ------------------------------------------------------------------------------
# 2. MODEL ARCHITECTURE
# ------------------------------------------------------------------------------
r_max: 5
l_max: 1
num_radial: 12
hidden_dim: 128
num_layers: 2
descriptor_passes: 1            # Number of ACE descriptor iterations before attention
descriptor_residual: true       # Add descriptor outputs residually across passes
interleave_descriptor: false     # Refresh ACE descriptors between local attention blocks
attention_num_heads: 4           # Local invariant attention heads over cutoff neighbors
attention_key_dim: null          # Per-head scalar key width (null chooses a conservative default)
attention_ffn_hidden: null       # Scalar FFN width after equivariant attention
attention_dropout: 0.0           # Dropout in local attention/FFN
attention_layer_scale_init: 0.01 # Small residual scale for stable deep local attention
attention_distance_penalty: true # Penalize long local edges in attention logits
radial_basis_type: "bessel"       # Options: bessel, gaussian
radial_trainable: false           # Make radial frequencies/centers learnable
envelope_exponent: 5              # Polynomial cutoff exponent (higher = steeper)
gaussian_width: 0.5              # Relative Gaussian width multiplier (only used if basis=gaussian)
radial_mlp_hidden: 64           # Hidden width for the radial mixing MLP
radial_mlp_layers: 2            # Layers for the radial mixing MLP

# ------------------------------------------------------------------------------
# 3. TRAINING PARAMETERS
# ------------------------------------------------------------------------------
epochs: 300
batch_size: 8
# Higher force focus with stable LR schedule
learning_rate: 0.002             # Slightly higher to emphasize force updates
# Optional optimizer and scheduler tweaks
weight_decay: 0.0
lr_scheduler_t_max: 300          # Epochs for one cosine cycle (defaults to total epochs)
lr_warmup_epochs: 0              # Linear warmup steps before cosine annealing
lr_warmup_start_factor: 0.1      # Starting LR factor for warmup (fraction of base LR, must be > 0)
lr_scheduler_interval: "epoch"   # Apply LR schedule per 'epoch' or per 'step' for faster ramping
lr_scheduler_use_restarts: false # Use cosine annealing with warm restarts instead of a single cycle
lr_restart_mult: 1.0             # Restart period multiplier for CosineAnnealingWarmRestarts
lr_min: 0.00005
clip_grad_norm: 1.0
use_amp: true                    # Enable mixed precision on CUDA for speed
amp_dtype: "bfloat16"            # Prefer bf16 for stability; use float16 if unavailable
grad_accum_steps: 1              # Gradient accumulation steps before optimizer step
precompute_neighbors: true       # Cache neighbor lists to cut CPU overhead
random_rotation: false           # Apply random SO(3) rotations per batch item
device: "cuda"
checkpoint_dir: "checkpoints"     # Directory to stash periodic checkpoints
checkpoint_interval: 0           # Save a checkpoint every N epochs (0 disables)
resume_from: null                # Path to a checkpoint to resume from
resume_load_optimizer: false     # Load optimizer state when resuming
resume_load_scheduler: false     # Load LR scheduler state when resuming
resume_load_scaler: false        # Load AMP GradScaler state when resuming
use_checkpoint_energy_shift: true # Use the energy shift stored in the checkpoint when resuming
energy_shift_per_atom: null       # Constant shift to subtract during training (eV/atom)
atomic_energies: null             # Map of species reference energies, e.g. {H: -0.5, O: -17.0}
solve_atomic_energies: false      # Fit per-species reference energies from the training set

# ------------------------------------------------------------------------------
# 4. LOSS WEIGHTS
# ------------------------------------------------------------------------------
energy_weight: 1.0
forces_weight: 10.0              # Emphasize forces early
forces_weight_final: 10.0        # Optional target force weight to anneal toward
forces_weight_decay_epochs: 0    # Epochs to linearly decay force weight (0 = no decay)
stress_weight: 1.0               # Energy-derived stress loss; set 0 to disable

# Auxiliary and regularization weights
aux_force_weight: 0.0            # Direct force heads are disabled to keep forces conservative
aux_stress_weight: 0.0           # Disable aux stress by default
force_consistency_weight: 0.0    # Forces already come from -dE/dr
sobolev_weight: 0.001            # Very light perturbation regularization
sobolev_sigma: 0.02

# Small-displacement augmentation
displacement_prob: 0.1
displacement_sigma: 0.02

# Attention controls
temperature_scale_start: 1.3
temperature_scale_end: 1.0
temperature_scale_epochs: 15
temperature_force_ref: 0.5
temperature_force_exponent: -0.25
